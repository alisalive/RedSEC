rules:
  - name: "Recon Chain"
    description: "Port scan followed by directory fuzzing — active reconnaissance pattern."
    conditions:
      - port_scan
      - dir_found
    window_seconds: 86400
    chain_name: "Recon Chain"
    severity: low

  - name: "Web Attack Chain"
    description: "Directory discovery followed by vulnerability detection — web exploitation pattern."
    conditions:
      - dir_found
      - vuln_found
    window_seconds: 86400
    chain_name: "Web Attack Chain"
    severity: high

  - name: "Credential Attack"
    description: "Brute force login failures followed by a successful login — credential attack pattern."
    conditions:
      - login_failed
      - login_success
    window_seconds: 86400
    chain_name: "Credential Attack"
    severity: high

  - name: "Full Attack Chain"
    description: "Port scan, vulnerability found, then successful exploitation — full kill chain."
    conditions:
      - port_scan
      - vuln_found
      - exploit_success
    window_seconds: 86400
    chain_name: "Full Attack Chain"
    severity: critical

  - name: "SQL Injection Chain"
    description: "Directory discovery followed by SQL injection finding — web SQL attack pattern."
    conditions:
      - dir_found
      - sqli_found
    window_seconds: 86400
    chain_name: "SQL Injection Chain"
    severity: high

  - name: "Post Exploitation"
    description: "Successful exploit followed by lateral movement — post-exploitation pattern."
    conditions:
      - exploit_success
      - lateral_movement
    window_seconds: 86400
    chain_name: "Post Exploitation"
    severity: critical

  - name: "Recon to Vuln Chain"
    description: "Port scan followed by vulnerability discovery — common recon-to-exploit pattern."
    conditions:
      - port_scan
      - vuln_found
    window_seconds: 86400
    chain_name: "Recon to Vuln Chain"
    severity: high

  - name: "AD Attack Chain"
    description: "Credential dumping followed by lateral movement — Active Directory attack pattern."
    conditions:
      - credential_dumped
      - lateral_movement
    window_seconds: 86400
    chain_name: "AD Attack Chain"
    severity: critical

  - name: "Recon to Exploit Pair"
    description: "Port scan followed by exploitation — confirms active attack, not just recon."
    type: pair_with_window
    first: port_scan
    second: exploit_success
    window_seconds: 300
    chain_name: "Recon to Exploit Pair"
    severity: critical
    on_match: "ATTACK CHAIN CONFIRMED: port_scan led to exploit_success"
    on_timeout: "RECON ONLY: port_scan detected but no exploitation followed"

  - name: "Credential Attack Pair"
    description: "Failed login followed by successful login — confirms credential attack success."
    type: pair_with_window
    first: login_failed
    second: login_success
    window_seconds: 120
    chain_name: "Credential Attack Pair"
    severity: critical
    on_match: "CREDENTIAL ATTACK CONFIRMED: brute force succeeded"
    on_timeout: "BRUTE FORCE FAILED: login_failed with no success"

  - name: "Lateral Movement Pair"
    description: "Exploitation followed by lateral movement — confirms post-exploitation activity."
    type: pair_with_window
    first: exploit_success
    second: lateral_movement
    window_seconds: 600
    chain_name: "Lateral Movement Pair"
    severity: critical
    on_match: "LATERAL MOVEMENT CONFIRMED: exploitation led to pivot"
    on_timeout: "EXPLOITATION ONLY: no lateral movement detected"
